name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test

  action-yml-guard:
    name: Verify action.yml uses __VERSION__ placeholder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check placeholder
        run: |
          if grep -q '__VERSION__' action.yml; then
            echo "✅ action.yml contains __VERSION__ placeholder — ok"
          else
            echo "❌ action.yml must contain __VERSION__ as the image tag on main (not a pinned version)"
            echo "   The release workflow substitutes this at release time."
            exit 1
          fi

  docker-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: gha-security-checks:smoke
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify container starts
        run: |
          docker run --rm --entrypoint node gha-security-checks:smoke \
            /app/dist/cli/index.js --version
