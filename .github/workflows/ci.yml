name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test

  action-yml-guard:
    name: Verify action.yml uses __VERSION__ placeholder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check placeholder
        run: |
          if grep -q '__VERSION__' action.yml; then
            echo "✅ action.yml contains __VERSION__ placeholder — ok"
          else
            echo "❌ action.yml must contain __VERSION__ as the image tag on main (not a pinned version)"
            echo "   The release workflow substitutes this at release time."
            exit 1
          fi

  docker-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5a1e60 # v3.10.0
      - uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          load: true
          tags: gha-security-checks:smoke
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify container starts
        run: docker run --rm gha-security-checks:smoke --help
